name: CI

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests-frontend:
    name: Testes Unitários (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependências do client
        run: cd client && npm ci

      - name: Executar testes unitários
        run: cd client && npm test -- --watchAll=false --passWithNoTests

  integration-tests-backend:
    name: Testes de Integração (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Permissão mvnw
        run: chmod +x api/mvnw

      - name: Executar testes do backend
        run: cd api && ./mvnw test -q

  e2e-tests:
    name: Testes E2E e API (Playwright)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: sqa_social
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Permissão mvnw
        run: chmod +x api/mvnw

      - name: Instalar dependências do client
        run: cd client && npm ci

      - name: Instalar dependências dos testes
        run: cd tests && npm ci && npx playwright install chromium --with-deps

      - name: Baixar dependências Maven
        run: cd api && ./mvnw dependency:resolve -q

      - name: Iniciar API em background
        run: |
          cd api && ./mvnw spring-boot:run \
            -Dspring-boot.run.jvmArguments="-Dspring.datasource.url=jdbc:mysql://localhost:3306/sqa_social -Dspring.datasource.username=root -Dspring.datasource.password=123456 -Dspring.jpa.hibernate.ddl-auto=create" &

      - name: Iniciar client em background
        run: cd client && npm run build && npm start &

      - name: Aguardar API subir (porta TCP)
        run: npx wait-on tcp:localhost:8080 --timeout 180000

      - name: Aguardar client subir (porta TCP)
        run: npx wait-on tcp:localhost:3000 --timeout 60000

      - name: Executar testes Playwright
        run: cd tests && npx playwright test

      - name: Upload relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
